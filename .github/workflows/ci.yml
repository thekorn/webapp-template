name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: oven-sh/setup-bun@main
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: check
        run: bun run check

      - name: Test
        run: bun run test

      - name: Build web
        run: bun run build:web

      - name: Build server
        run: bun run build:server

      - name: Build CSS
        run: bun run build:css
